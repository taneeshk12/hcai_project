<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Triage RAG Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --card:     #1c2333;
      --border:   #30363d;
      --accent:   #e63946;
      --accent2:  #f4a261;
      --green:    #3fb950;
      --blue:     #58a6ff;
      --purple:   #a371f7;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; }
    header h1 span { font-size: 0.78rem; color: var(--muted); margin-left: 6px; font-weight: 400; }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Layout ─────────────────────────────── */
    main { flex: 1; display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 71px); }

    /* ── Left Panel ─────────────────────────── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 22px;
      display: flex; flex-direction: column; gap: 18px;
      overflow-y: auto;
    }
    .panel-section-title { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; }

    textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.85rem;
      padding: 12px 14px; resize: none; outline: none;
      transition: border-color 0.2s; min-height: 130px; line-height: 1.5;
    }
    textarea:focus { border-color: var(--blue); }

    .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .risk-btn {
      padding: 9px 6px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 0.78rem;
      font-weight: 600; cursor: pointer; transition: all 0.18s; text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .risk-btn:hover { border-color: var(--blue); color: var(--text); }
    .risk-btn[data-risk="Critical"].active { border-color: #ff4d6d; background: rgba(255,77,109,0.12); color: #ff4d6d; }
    .risk-btn[data-risk="High"].active     { border-color: var(--accent2); background: rgba(244,162,97,0.12); color: var(--accent2); }
    .risk-btn[data-risk="Medium"].active   { border-color: #f9c74f; background: rgba(249,199,79,0.12); color: #f9c74f; }
    .risk-btn[data-risk="Low"].active      { border-color: var(--green); background: rgba(63,185,80,0.12); color: var(--green); }

    .btn-submit {
      background: linear-gradient(135deg, var(--accent), #c1121f);
      color: #fff; border: none; border-radius: var(--radius);
      padding: 13px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      width: 100%; font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .example-chip {
      display: inline-block; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 11px; font-size: 0.73rem; color: var(--muted);
      cursor: pointer; margin: 2px; transition: all 0.18s; font-family: 'Inter', sans-serif;
    }
    .example-chip:hover { border-color: var(--blue); color: var(--text); background: rgba(88,166,255,0.08); }

    /* ── Chat Area ──────────────────────────── */
    .chat-area { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }
    .messages { flex: 1; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 28px; }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); text-align: center; }
    .welcome-icon { font-size: 52px; }
    .welcome h2 { font-size: 1.3rem; color: var(--text); font-weight: 600; }
    .welcome p { font-size: 0.87rem; max-width: 380px; line-height: 1.65; }

    /* Message */
    .msg { display: flex; flex-direction: column; gap: 8px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .msg-header { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .msg-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .msg.user .msg-icon  { background: rgba(88,166,255,0.18); }
    .msg.agent .msg-icon { background: rgba(230,57,70,0.18); }

    .msg.user .msg-body {
      background: var(--card); border: 1px solid rgba(88,166,255,0.2);
      border-radius: var(--radius); padding: 14px 18px;
      font-size: 0.87rem; line-height: 1.6; color: var(--text);
    }

    /* ── Structured Report ──────────────────── */
    .report {
      background: var(--card);
      border: 1px solid rgba(230,57,70,0.2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Risk Banner */
    .risk-banner {
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .risk-banner .label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .risk-pill {
      font-size: 0.82rem; font-weight: 700; padding: 4px 14px;
      border-radius: 20px; font-family: 'JetBrains Mono', monospace;
    }
    .risk-Critical { background: rgba(255,77,109,0.18); color: #ff4d6d; border: 1px solid rgba(255,77,109,0.3); }
    .risk-High     { background: rgba(244,162,97,0.18); color: var(--accent2); border: 1px solid rgba(244,162,97,0.3); }
    .risk-Medium   { background: rgba(249,199,79,0.18); color: #f9c74f; border: 1px solid rgba(249,199,79,0.3); }
    .risk-Low      { background: rgba(63,185,80,0.18); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }

    /* Report Sections */
    .report-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .report-section:last-child { border-bottom: none; }
    .section-title {
      font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .section-title::before { content: ''; display: block; width: 3px; height: 12px; border-radius: 2px; background: currentColor; }

    /* Key Drivers */
    .drivers-list { display: flex; flex-direction: column; gap: 6px; }
    .driver-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 0.83rem; font-family: 'JetBrains Mono', monospace;
    }
    .driver-bullet { color: var(--accent2); font-size: 0.9rem; flex-shrink: 0; }

    /* Evidence */
    .evidence-list { display: flex; flex-direction: column; gap: 10px; }
    .evidence-item { background: rgba(255,255,255,0.02); border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; padding: 10px 14px; }
    .evidence-source { font-size: 0.7rem; font-weight: 600; color: var(--blue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .evidence-text { font-size: 0.83rem; color: var(--text); line-height: 1.55; }

    /* Interpretation */
    .interpretation-text { font-size: 0.87rem; line-height: 1.7; color: var(--text); }

    /* Recommended Action */
    .action-box {
      background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.25);
      border-radius: 8px; padding: 12px 16px;
      font-size: 0.87rem; color: var(--green); line-height: 1.55;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .action-box::before { content: '⚡'; flex-shrink: 0; }

    /* Thinking */
    .thinking { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.83rem; animation: fadeUp 0.3s ease; }
    .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: bounce 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    /* Risk badge in user msg header */
    .risk-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-left: 6px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🚑</div>
  <h1>Emergency Triage RAG Assistant <span>Clinical Decision Support</span></h1>
  <div class="status-dot"><div class="dot"></div>Live</div>
</header>

<main>
  <aside class="panel">
    <div>
      <div class="panel-section-title">Patient Input</div>
      <textarea id="patient-info" placeholder="e.g. 67-year-old male, temp 39.4°C, HR 128, BP 88/54, RR 28/min, SpO2 92%, confused, lactate 4.2 mmol/L, suspected source: urinary"></textarea>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitQuery()">⚡ Generate Clinical Report</button>

    <div>
      <div class="panel-section-title">Quick Examples</div>
      <button class="example-chip" onclick="fillExample('sepsis')">Sepsis + lactate</button>
      <button class="example-chip" onclick="fillExample('chest')">Chest pain + diaphoresis</button>
      <button class="example-chip" onclick="fillExample('stroke')">Facial droop + weakness</button>
      <button class="example-chip" onclick="fillExample('respiratory')">SpO2 88% + dyspnoea</button>
      <button class="example-chip" onclick="fillExample('trauma')">Head injury + GCS drop</button>
    </div>
  </aside>

  <section class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🏥</div>
        <h2>Clinical Triage Assistant</h2>
        <p>Enter patient vitals and symptoms, select the predicted risk level, and generate a structured clinical report backed by your RAG knowledge base.</p>
      </div>
    </div>
  </section>
</main>

<script>
  const examples = {
    sepsis:      { text: "67-year-old male, temp 39.4°C, HR 128 bpm, BP 88/54 mmHg, RR 28/min, SpO2 92%, confused, lactate 4.2 mmol/L, suspected urinary source." },
    chest:       { text: "58-year-old male, crushing chest pain radiating to left arm, diaphoresis, BP 88/60 mmHg, HR 115 bpm, SpO2 94%, ST-elevation on ECG." },
    stroke:      { text: "72-year-old female, sudden right facial droop, slurred speech, left arm weakness, GCS 13, onset 45 minutes ago, BP 178/96 mmHg." },
    respiratory: { text: "65-year-old COPD patient, SpO2 88% on room air, RR 32/min, severe dyspnoea, using accessory muscles, HR 110 bpm, no fever." },
    trauma:      { text: "19-year-old male, fell from bicycle, head impact, GCS dropped from 15 to 12, confused, pupils equal, BP 130/80 mmHg, HR 90 bpm." },
  };

  function fillExample(key) {
    const ex = examples[key];
    document.getElementById("patient-info").value = ex.text;
  }

  async function submitQuery() {
    const patientInfo = document.getElementById("patient-info").value.trim();
    if (!patientInfo) { document.getElementById("patient-info").focus(); return; }

    const messagesEl = document.getElementById("messages");
    const welcome    = document.getElementById("welcome");
    const submitBtn  = document.getElementById("submit-btn");
    if (welcome) welcome.remove();

    submitBtn.disabled = true;
    submitBtn.textContent = "Generating…";

    // User bubble
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerHTML = `
      <div class="msg-header">
        <div class="msg-icon">👤</div> Patient Input
      </div>
      <div class="msg-body">${escapeHtml(patientInfo)}</div>`;
    messagesEl.appendChild(userMsg);

    // Thinking
    const thinking = document.createElement("div");
    thinking.className = "thinking";
    thinking.innerHTML = `<div class="dots"><span></span><span></span><span></span></div> Retrieving evidence and generating structured report…`;
    messagesEl.appendChild(thinking);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res  = await fetch("/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ patient_info: patientInfo }) });
      const data = await res.json();
      thinking.remove();

      if (data.error) {
        appendError(messagesEl, data.error);
      } else {
        const agentMsg = document.createElement("div");
        agentMsg.className = "msg agent";
        agentMsg.innerHTML = `
          <div class="msg-header"><div class="msg-icon">🤖</div> Clinical Assessment</div>
          ${renderReport(data.report, data.sources)}`;
        messagesEl.appendChild(agentMsg);
      }
    } catch(err) {
      thinking.remove();
      appendError(messagesEl, "Connection error — is the Flask server running?");
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
    submitBtn.disabled = false;
    submitBtn.textContent = "⚡ Generate Clinical Report";
  }

  function renderReport(raw, sources) {
    const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);

    // Parse sections
    let drivers = [], evidence = [], interpretation = "", action = "";
    let section = "";
    let predictedRisk = "Unknown";

    for (const line of lines) {
      if (/^predicted risk:/i.test(line)) { 
        predictedRisk = line.split(":")[1].trim();
        continue; 
      }
      if (/^key drivers:/i.test(line))         { section = "drivers";        continue; }
      if (/^evidence retrieved:/i.test(line))  { section = "evidence";       continue; }
      if (/^clinical interpretation:/i.test(line)) { section = "interp";     continue; }
      if (/^recommended action:/i.test(line))  { section = "action";         continue; }

      if (section === "drivers"  && line.startsWith("•")) drivers.push(line.slice(1).trim());
      if (section === "evidence") evidence.push(line);
      if (section === "interp")   interpretation += line + " ";
      if (section === "action")   action += line + " ";
    }

    // Build evidence blocks: [Title]\nText pairs
    const evidenceBlocks = [];
    let i = 0;
    while (i < evidence.length) {
      const titleLine = evidence[i];
      if (titleLine.startsWith("[") && titleLine.endsWith("]")) {
        const title = titleLine.slice(1, -1);
        const text  = evidence[i + 1] || "";
        evidenceBlocks.push({ title, text });
        i += 2;
      } else { i++; }
    }

    // Fallback: use source metadata if LLM didn't produce structured evidence
    if (evidenceBlocks.length === 0 && sources) {
      sources.forEach(s => evidenceBlocks.push({ title: s.title, text: `Source: ${s.source}` }));
    }

    const driverHTML = drivers.length
      ? `<div class="drivers-list">${drivers.map(d => `<div class="driver-item"><span class="driver-bullet">•</span>${escapeHtml(d)}</div>`).join("")}</div>`
      : `<div style="color:var(--muted);font-size:0.83rem;">No key drivers extracted.</div>`;

    const evidenceHTML = evidenceBlocks.length
      ? `<div class="evidence-list">${evidenceBlocks.map(e => `<div class="evidence-item"><div class="evidence-source">${escapeHtml(e.title)}</div><div class="evidence-text">${escapeHtml(e.text)}</div></div>`).join("")}</div>`
      : "";

    return `<div class="report">
      <div class="risk-banner">
        <span class="label">Predicted Risk</span>
        <span class="risk-pill risk-${predictedRisk}">${predictedRisk.toUpperCase()}</span>
      </div>
      <div class="report-section">
        <div class="section-title" style="color:var(--accent2);">Key Drivers</div>
        ${driverHTML}
      </div>
      ${evidenceHTML ? `<div class="report-section">
        <div class="section-title" style="color:var(--blue);">Evidence Retrieved</div>
        ${evidenceHTML}
      </div>` : ""}
      ${interpretation ? `<div class="report-section">
        <div class="section-title" style="color:var(--purple);">Clinical Interpretation</div>
        <div class="interpretation-text">${escapeHtml(interpretation.trim())}</div>
      </div>` : ""}
      ${action ? `<div class="report-section">
        <div class="section-title" style="color:var(--green);">Recommended Action</div>
        <div class="action-box">${escapeHtml(action.trim())}</div>
      </div>` : ""}
    </div>`;
  }

  function appendError(container, msg) {
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div style="background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3);border-radius:12px;padding:14px 18px;color:#ff4d6d;font-size:0.85rem;">⚠ ${escapeHtml(msg)}</div>`;
    container.appendChild(el);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("patient-info").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitQuery();
  });
</script>
</body>
</html>
